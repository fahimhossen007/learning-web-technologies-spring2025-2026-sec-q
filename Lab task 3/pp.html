<!DOCTYPE html>
<html>
<body>
    <fieldset style="width: 300px;">
        <legend><b>PROFILE PICTURE</b></legend>
        <form onsubmit="return validate()">
            User Id: <input type="number" id="uid"><br>
            Picture: <input type="file" id="pic"><br>
            <hr>
            <input type="submit" value="Submit">
            <p id="msg" style="color:red"></p>
        </form>
    </fieldset>
    <script>
    function validate() {
        let u = document.getElementById('uid').value;
        let p = document.getElementById('pic').value;
        if(u === "" || u <= 0) { // 
            document.getElementById('msg').innerText = "UserId cannot be empty and must be positive"; return false;
        }
        if(p === "") { // 
            document.getElementById('msg').innerText = "Picture cannot be empty"; return false;
        }
        return true;
    }
    </script>
</body>
</html>
